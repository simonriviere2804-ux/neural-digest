<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL DIGEST</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{background:#0a0a0f;color:#e8e8f0;font-family:'Bricolage Grotesque',sans-serif;min-height:100vh;margin:0}
header{padding:2rem 2rem 1.5rem;border-bottom:1px solid #1e1e2e;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.logo{font-family:'DM Serif Display',serif;font-size:2.5rem;color:#e8e8f0}.logo span{color:#7cffd4;font-style:italic}
.tagline{font-family:'DM Mono',monospace;font-size:0.65rem;color:#6b6b80;letter-spacing:0.15em;text-transform:uppercase;margin-top:0.2rem}
.btn{background:transparent;border:1px solid #7cffd4;color:#7cffd4;font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.6rem 1.2rem;cursor:pointer}
.btn:hover{background:#7cffd4;color:#0a0a0f}
.btn:disabled{opacity:0.4;cursor:not-allowed}
main{padding:2rem;max-width:1200px;margin:0 auto}
#status{font-family:'DM Mono',monospace;font-size:0.7rem;color:#a78bfa;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.card{background:#13131e;border:1px solid #1e1e2e;padding:1.5rem;display:flex;flex-direction:column;gap:0.8rem}
.card:first-child{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.tag{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.5rem;border:1px solid #7cffd4;color:#7cffd4;display:inline-block}
.title{font-family:'DM Serif Display',serif;font-size:1.2rem;line-height:1.3;color:#e8e8f0}
.card:first-child .title{font-size:1.8rem}
.summary{font-size:0.82rem;line-height:1.7;color:#9898b0}
.why{font-size:0.75rem;color:#7cffd480;border-top:1px solid #1e1e2e;padding-top:0.6rem}
.src{font-family:'DM Mono',monospace;font-size:0.58rem;color:#6b6b80}
.loader{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:4rem;grid-column:1/-1}
.spin{width:32px;height:32px;border:2px solid #1e1e2e;border-top-color:#7cffd4;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'DM Mono',monospace;font-size:0.7rem;color:#6b6b80}
.empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;display:flex;flex-direction:column;align-items:center;gap:0.8rem}
.empty h2{font-family:'DM Serif Display',serif;font-size:1.5rem}
.empty p{color:#6b6b80;font-size:0.85rem;max-width:350px}
.err{color:#ff6b6b;font-family:'DM Mono',monospace;font-size:0.65rem;background:#1a0808;border:1px solid #ff6b6b;padding:0.5rem 1rem;max-width:400px;word-break:break-all}
@media(max-width:600px){.card:first-child{grid-template-columns:1fr}.card:first-child .title{font-size:1.3rem}header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">NEURAL<span>DIGEST</span></div>
    <div class="tagline">Veille IA · LLaMA 3.3 · Groq · NewsAPI</div>
  </div>
  <button class="btn" id="btn" onclick="load()">↻ Générer le digest</button>
</header>
<main>
  <div id="status">Prêt — cliquez sur Générer le digest</div>
  <div class="grid" id="grid">
    <div class="empty">
      <div style="font-size:2rem">◈</div>
      <h2>Votre veille IA vous attend</h2>
      <p>Cliquez sur "Générer le digest" pour obtenir un résumé des dernières actualités IA.</p>
    </div>
  </div>
</main>
<script>
async function load(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⟳ Chargement...';
  document.getElementById('status').textContent='Analyse en cours...';
  document.getElementById('grid').innerHTML='<div class="loader"><div class="spin"></div><div class="ltxt">LLaMA 3.3 analyse les actualités...</div></div>';
  try{
    const r=await fetch('/api/digest');
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const arts=d.articles||[];
    document.getElementById('status').textContent=`${arts.length} articles générés · LLaMA 3.3 via Groq`;
    document.getElementById('grid').innerHTML=arts.map((a,i)=>`
      <div class="card">
        <span class="tag">${a.categorie||'IA'}</span>
        <div class="title">${a.titre}</div>
        ${a.source?`<div class="src">◎ ${a.source}</div>`:''}
        <div class="summary">${a.resume}</div>
        ${a.pourquoi_important?`<div class="why">◈ ${a.pourquoi_important}</div>`:''}
      </div>`).join('');
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="empty"><div style="font-size:2rem">⚠</div><h2>Erreur</h2><p>Vérifiez vos clés API.</p><div class="err">${e.message}</div></div>`;
    document.getElementById('status').textContent='Erreur';
  }
  btn.disabled=false;btn.textContent='↻ Régénérer';
}
</script>
</body>
</html>
