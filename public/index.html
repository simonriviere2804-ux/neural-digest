<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL DIGEST — Actualités IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--border:#1e1e2e;--accent:#7cffd4;--accent2:#ff6b6b;--accent3:#a78bfa;--text:#e8e8f0;--muted:#6b6b80;--card:#13131e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,255,212,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,255,212,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
header{padding:2.5rem 3rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.logo{font-family:'DM Serif Display',serif;font-size:3rem;letter-spacing:-0.03em;line-height:1}
.logo span{color:var(--accent);font-style:italic}
.tagline{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:0.25rem}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.6rem}
.badges{display:flex;gap:0.5rem}
.badge{padding:0.2rem 0.5rem;border:1px solid;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em}
.badge-groq{color:#f97316;border-color:#f97316}
.badge-news{color:var(--accent3);border-color:var(--accent3)}
.live{display:flex;align-items:center;gap:0.4rem;font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--accent);text-transform:uppercase}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.6rem 1.2rem;cursor:pointer;transition:all 0.2s}
.btn:hover{background:var(--accent);color:var(--bg)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
nav{display:flex;padding:0 3rem;border-bottom:1px solid var(--border);overflow-x:auto}
.cat{background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.9rem 1.2rem;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;margin-bottom:-1px}
.cat:hover{color:var(--text)}
.cat.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:2.5rem 3rem;max-width:1400px;margin:0 auto}
.statusbar{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);flex-wrap:wrap}
.sep{color:var(--border)}
#st{color:var(--accent3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5px;background:var(--border);border:1px solid var(--border)}
.card{background:var(--card);padding:1.75rem;display:flex;flex-direction:column;gap:0.9rem;position:relative;overflow:hidden;opacity:0;transform:translateY(8px);animation:cin 0.35s forwards}
@keyframes cin{to{opacity:1;transform:translateY(0)}}
.card:hover{background:#161623}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--accent);transition:height 0.3s}
.card:hover::before{height:100%}
.card.featured{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:2.5rem}
.card.featured .ctitle{font-size:2rem}
.cmeta{display:flex;align-items:center;justify-content:space-between}
.ctag{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.2rem 0.5rem;border:1px solid}
.t-r{color:var(--accent);border-color:var(--accent)}
.t-i{color:#fbbf24;border-color:#fbbf24}
.t-e{color:var(--accent2);border-color:var(--accent2)}
.t-p{color:var(--accent3);border-color:var(--accent3)}
.t-o{color:#fb923c;border-color:#fb923c}
.t-d{color:#34d399;border-color:#34d399}
.cnum{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--border)}
.ctitle{font-family:'DM Serif Display',serif;font-size:1.25rem;line-height:1.3}
.csrc{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted)}
.csum{font-size:0.82rem;line-height:1.7;color:#9898b0;flex:1}
